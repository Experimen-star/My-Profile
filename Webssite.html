<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siman Hembram | Portfolio</title>
    <style>
        /* General Page Styling */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
            color: #333;
        }
        .container { max-width: 450px; margin: 0 auto; }

        /* Profile Image Styling */
        .profile-img { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            margin-bottom: 20px; 
        }

        h1 { margin: 10px 0; font-size: 26px; color: #2c3e50; }
        p.role { color: #7f8c8d; margin-bottom: 30px; font-weight: 500; }

        /* Button Styling */
        .link-wrapper { margin-bottom: 20px; }
        .btn { 
            display: block; 
            background: #ffffff; 
            color: #2c3e50; 
            padding: 16px; 
            text-decoration: none; 
            border-radius: 12px; 
            border: 1px solid #e0e0e0;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .btn:hover { 
            background: #2c3e50; 
            color: white; 
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        /* Disclaimer Styling */
        .disclaimer { 
            font-size: 11px; 
            color: #95a5a6; 
            margin-top: 5px; 
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- IMAGE: Replace the URL below with your Imgur or GitHub image link -->
        <img src="https://github.com/Seuli170/My-Profile" alt="Siman Hembram" class="profile-img">
        
        <h1>Siman Hembram</h1>
        <p class="role">GIS Specialist | Infosys BPM</p>

        <!-- Links -->
        <div class="link-wrapper">
            <a href="https://www.linkedin.com/feed" class="btn">LinkedIn</a>
            <span class="disclaimer">Professional Network</span>
        </div>

        <div class="link-wrapper">
            <a href="https://www.instagram.com/hembramsiman" class="btn">Instagram</a>
            <span class="disclaimer">Note: Login may be required to view</span>
        </div>

        <div class="link-wrapper">
            <a href="https://www.facebook.com/siman.hembram.374" class="btn">Facebook</a>
            <span class="disclaimer">Note: Login may be required to view</span>
        </div>
    </div>

</body>
</html>
