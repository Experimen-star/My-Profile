<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siman Hembram | Portfolio</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* Added space background */
            background-image: url('https://stockcake.com/i/cosmic-space-galaxy_1172192_1039562');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
            color: #ffffff; /* Changed text color to white for better contrast */
        }
        
        .container { 
            max-width: 450px; 
            margin: 0 auto; 
            background: rgba(0, 0, 0, 0.6); /* Semi-transparent background */
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px); /* Frosted glass effect */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-img { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 4px solid #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            margin-bottom: 20px; 
        }

        h1 { margin: 10px 0; font-size: 26px; color: #ffffff; }
        p.role { color: #bdc3c7; margin-bottom: 30px; font-weight: 500; }

        .link-wrapper { margin-bottom: 20px; }
        .btn { 
            display: block; 
            background: rgba(255, 255, 255, 0.1); 
            color: white; 
            padding: 16px; 
            text-decoration: none; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn:hover { 
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .disclaimer { 
            font-size: 11px; 
            color: #bdc3c7; 
            margin-top: 5px; 
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="YOUR_PROFILE_IMAGE_URL" alt="Siman Hembram" class="profile-img">
        
        <h1>Siman Hembram</h1>
        <p class="role">GIS Specialist | Infosys BPM</p>

        <div class="link-wrapper">
            <a href="https://www.linkedin.com/feed" class="btn">LinkedIn</a>
            <span class="disclaimer">Professional Network</span>
        </div>

        <div class="link-wrapper">
            <a href="https://www.instagram.com/hembramsiman" class="btn">Instagram</a>
            <span class="disclaimer">Note: Login may be required to view</span>
        </div>

        <div class="link-wrapper">
            <a href="https://www.facebook.com/siman.hembram.374" class="btn">Facebook</a>
            <span class="disclaimer">Note: Login may be required to view</span>
        </div>
    </div>

</body>
</html>
