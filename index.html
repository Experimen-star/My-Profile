<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siman Hembram | Portfolio</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-image: url('https://images.stockcake.com/public/9/b/5/9b5fcb58-2c91-4b6c-86c1-3ea0f48fc717/cosmic-space-galaxy-stockcake.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
            color: #ffffff;
        }
        
        .container { 
            max-width: 450px; 
            margin: 0 auto; 
            background: rgba(0, 0, 0, 0.6); 
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-img { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 4px solid #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            margin-bottom: 20px; 
        }

        h1 { margin: 10px 0; font-size: 26px; color: #ffffff; }
        p.role { color: #bdc3c7; margin-bottom: 30px; font-weight: 500; }

        .link-wrapper { margin-bottom: 20px; }
        
        /* General Button Styling */
        .btn { 
            display: block; 
            color: white; 
            padding: 16px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.2); }

        /* Brand Specific Colors */
        .btn-linkedin { background-color: #0077b5; }
        .btn-instagram { background-color: #833ab4; }
        .btn-facebook { background-color: #f09433; }

        .disclaimer { font-size: 11px; color: #bdc3c7; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://media.licdn.com/dms/image/v2/D5603AQFe_uo3XpX9Tw/profile-displayphoto-crop_800_800/B56Zxih2jkJsAI-/0/1771179568806?e=1784160000&v=beta&t=CmuH0HTrEjDYLrFTR3jeMSFi9UStcGkOHE4TiNWTtao" alt="Siman Hembram" class="profile-img">
        
        <h1>Siman Hembram</h1>
        <p class="role">GIS Specialist | Mapping Expert | Infosys BPM</p>

        <div class="link-wrapper">
            <a href="https://www.linkedin.com/feed" class="btn btn-linkedin">LinkedIn</a>
            <span class="disclaimer">Clicked on the link</span>
        </div>

        <div class="link-wrapper">
            <a href="https://www.instagram.com/hembramsiman" class="btn btn-instagram">Instagram</a>
            <span class="disclaimer">Clicked on the link</span>
        </div>

        <div class="link-wrapper">
            <a href="https://www.facebook.com/siman.hembram.374" class="btn btn-facebook">Facebook</a>
            <span class="disclaimer">Clicked on the link</span>
        </div>
    </div>

</body>
</html>
